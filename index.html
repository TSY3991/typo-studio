<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TYPO STUDIO - IG Post Composer</title>
<script src="vendor/react.min.js"></script>
<script src="vendor/react-dom.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c12;color:#c0c0d0;font-family:'Noto Sans TC',sans-serif;overflow:hidden;height:100vh}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#8080b0;border:2px solid #1a1a24;cursor:pointer;margin-top:-6px}
input[type=range]::-webkit-slider-runnable-track{height:2px;background:#2a2a38;border-radius:1px}
textarea:focus,input:focus{border-color:#4a4a70 !important;outline:none}
*{scrollbar-width:thin;scrollbar-color:#2a2a38 transparent}
*::-webkit-scrollbar{width:4px}*::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:4px}
*::-webkit-scrollbar-thumb:hover{background:#3a3a50}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page-thumb{transition:all .2s;cursor:pointer;border:2px solid transparent;border-radius:6px;overflow:hidden;flex-shrink:0;position:relative}
.page-thumb:hover{border-color:#5a5a80;transform:scale(1.05)}
.page-thumb.active{border-color:#7070a0;box-shadow:0 0 12px rgba(112,112,160,0.3)}
.drop-zone{transition:all .2s;position:relative;cursor:pointer}
.drop-zone:hover{opacity:0.85}
.drop-zone.dragging{outline:2px dashed #7070a0;outline-offset:-4px}
.btn{background:none;border:1px solid #2a2a3a;border-radius:6px;color:#8888a0;cursor:pointer;transition:all .2s;font-family:'Space Mono','Noto Sans TC',monospace;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{border-color:#5a5a80;color:#d0d0e0;background:rgba(255,255,255,0.03)}
.btn.active{border-color:#6868a0;color:#d0d0e0;background:#1e1e2a}
.btn.danger{border-color:#3a2020;color:#aa5555}
.btn.danger:hover{border-color:#663333;color:#ff5555;background:rgba(255,50,50,0.05)}
.btn.primary{border-color:#4a4a70;color:#b0b0d0;background:#1a1a28}
.btn.primary:hover{border-color:#6868a0;color:#e0e0f0;background:#222238}
.tab-btn{flex:1;padding:12px 0;border:none;background:none;color:#5a5a78;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border-bottom:2px solid transparent;position:relative}
.tab-btn:hover{color:#9090b0}
.tab-btn.active{color:#d0d0e0;border-bottom-color:#7070a0}
.sec-title{font-size:10px;font-weight:700;color:#7070a0;text-transform:uppercase;letter-spacing:4px;margin-bottom:14px;padding-left:12px;border-left:2px solid #404066;font-family:'Space Mono',monospace}
.field-label{font-size:12px;color:#9090a8;margin-bottom:6px;font-weight:500}
.field-input{width:100%;background:#12121c;border:1px solid #2a2a3a;border-radius:6px;color:#c8c8e0;padding:10px 12px;font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s}
.field-input:focus{border-color:#4a4a70}
.add-menu{position:absolute;top:100%;left:0;z-index:100;background:#16161e;border:1px solid #2a2a3a;border-radius:8px;padding:6px;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,0.6);animation:fi .15s ease}
.add-menu button{width:100%;padding:10px 14px;border:none;background:none;color:#9090a8;font-size:12px;text-align:left;cursor:pointer;border-radius:6px;transition:all .15s;display:flex;align-items:center;gap:10px}
.add-menu button:hover{background:#1e1e2a;color:#d0d0e0}
.add-menu button .type-icon{width:28px;height:28px;border-radius:4px;background:#1a1a28;border:1px solid #2a2a3a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#6868a0;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="vendor/app.compiled.js"></script>
</body>
</html>
